<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kraken Chess Trainer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chessboard.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <!-- Свои стили -->
    <link rel="stylesheet" href="styles.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><!-- Chessboard.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script><!-- Chess.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>

<body>

<!-- Кракен-оверлей (фоновые щупальца при атаке) -->
<div class="kraken-overlay">
    <div class="tentacle" style="--rot: 20deg; animation: wave 7s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 70deg; animation: wave 9s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 120deg; animation: wave 6s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 160deg; animation: wave 10s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 210deg; animation: wave 8s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 260deg; animation: wave 11s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 300deg; animation: wave 5s infinite ease-in-out;"></div>
    <div class="tentacle" style="--rot: 340deg; animation: wave 12s infinite ease-in-out;"></div>
</div>

<!-- Виньетка повреждения -->
<div id="damage-vignette" class="damage-vignette"></div>

<div class="app">

    <!-- ═══ Колонка 1: Панель управления ═══ -->
    <aside class="side-panel">
        <div class="info-card">
            <div id="rating-display">
                <div class="rating-main">
                    <span class="label">Рейтинг</span>
                    <span id="rating-value">2000</span>
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="control-group">
                <label>Начальный рейтинг</label>
                <select id="startRating">
                    <option value="1000">Юнга — 1000</option>
                    <option value="1400" selected>Матрос — 1400</option>
                    <option value="1800">Капитан — 1800</option>
                    <option value="2200">Морской волк — 2200</option>
                </select>
            </div>

            <div class="control-group">
                <label>Играть за</label>
                <select id="playerColor">
                    <option value="white">Белые</option>
                    <option value="black">Чёрные</option>
                </select>
            </div>

            <div class="btn-row">
                <button class="btn-secondary" id="applyRating">Применить</button></div>
            <button class="btn-start" onclick="startGame()">В бой</button>
        </div>

        <!-- ═══ Морская сцена ═══ -->
        <div class="sea-scene">

            <!-- Волны -->
            <div class="sea-waves">
                <div class="sea-wave"></div>
                <div class="sea-wave"></div>
                <div class="sea-wave"></div>
            </div>
		
		
	    <!-- Погодные эффекты -->
<div class="weather-layer" id="weather-layer">
  <!-- Дождь (для шторма) -->
  <div class="rain-container">
    <div class="raindrop" style="--x: 10%; --delay: 0s; --duration: 0.6s;"></div>
    <div class="raindrop" style="--x: 20%; --delay: 0.1s; --duration: 0.5s;"></div>
    <div class="raindrop" style="--x: 30%; --delay: 0.3s; --duration: 0.7s;"></div>
    <div class="raindrop" style="--x: 40%; --delay: 0.15s; --duration: 0.55s;"></div>
    <div class="raindrop" style="--x: 50%; --delay: 0.4s; --duration: 0.65s;"></div>
    <div class="raindrop" style="--x: 60%; --delay: 0.2s; --duration: 0.5s;"></div>
    <div class="raindrop" style="--x: 70%; --delay: 0.35s; --duration: 0.6s;"></div>
    <div class="raindrop" style="--x: 80%; --delay: 0.05s; --duration: 0.7s;"></div>
    <div class="raindrop" style="--x: 90%; --delay: 0.25s; --duration: 0.55s;"></div>
    <div class="raindrop" style="--x: 15%; --delay: 0.45s; --duration: 0.6s;"></div>
    <div class="raindrop" style="--x: 35%; --delay: 0.12s; --duration: 0.5s;"></div>
    <div class="raindrop" style="--x: 55%; --delay: 0.38s; --duration: 0.65s;"></div>
    <div class="raindrop" style="--x: 75%; --delay: 0.08s; --duration: 0.7s;"></div>
    <div class="raindrop" style="--x: 95%; --delay: 0.28s; --duration: 0.55s;"></div>
    <div class="raindrop" style="--x: 5%; --delay: 0.5s; --duration: 0.6s;"></div>
  </div>

  <!-- Ветер (полосы) -->
  <div class="wind-container">
    <div class="wind-streak" style="--y: 20%; --delay: 0s; --duration: 1.2s;"></div>
    <div class="wind-streak" style="--y: 40%; --delay: 0.4s; --duration: 1s;"></div>
    <div class="wind-streak" style="--y: 60%; --delay: 0.2s; --duration: 1.4s;"></div>
    <div class="wind-streak" style="--y: 80%; --delay: 0.6s; --duration: 1.1s;"></div>
    <div class="wind-streak" style="--y: 30%; --delay: 0.8s; --duration: 1.3s;"></div>
    <div class="wind-streak" style="--y: 70%; --delay: 0.3s; --duration: 0.9s;"></div></div>

  <!-- Туман -->
  <div class="fog-container">
    <div class="fog-bank fog-bank-1"></div>
    <div class="fog-bank fog-bank-2"></div>
    <div class="fog-bank fog-bank-3"></div>
  </div>

  <!-- Молнии (для шторма) -->
  <div class="lightning-container">
    <div class="lightning-flash"></div>
  </div>
</div>

<!-- Индикатор погоды -->
<div class="weather-indicator" id="weather-indicator">
  <span class="weather-icon" id="weather-icon">☀️</span>
  <span class="weather-name" id="weather-name">Штиль</span>
</div>
            <!-- Маршрут -->
            <div class="voyage-track">

                <!-- Порт отправления — якорь -->
                <div class="voyage-start">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="6" r="2.5"/>
                        <line x1="12" y1="8.5" x2="12" y2="21"/>
                        <path d="M5 15c0 3.87 3.13 7 7 7s7-3.13 7-7"/>
                        <line x1="8" y1="11" x2="16" y2="11"/>
                    </svg>
                </div>

                <!-- Прогресс -->
                <div class="voyage-progress-bg">
                    <div id="voyage-fill" class="voyage-fill" style="width:0%"><!-- Красивый корабль -->
                        <div id="ship" class="ship ship-editorial">
                            <div class="ship-drift-shell">
                                <div class="ship-bob">
                                    <svg class="ship-svg ship-svg--editorial" viewBox="0 0 160 100" aria-hidden="true">
                                        <!-- кильватер -->
                                        <path class="ship-wake-line" d="M12 72 C26 68, 42 68, 58 72"/><path class="ship-wake-line" d="M4 78 C18 74, 36 74, 50 78"/>

                                        <!-- корпус -->
                                        <path class="ship-hull" d="M38 60 L118 60 L104 76 L50 76 L38 60 Z"/>

                                        <!-- ватерлиния -->
                                        <line class="ship-detail" x1="44" y1="66" x2="106" y2="66"/>

                                        <!-- рубка -->
                                        <rect class="ship-cabin" x="62" y="46" width="22" height="14" rx="1"/>

                                        <!-- труба -->
                                        <rect class="ship-chimney" x="88" y="38" width="10" height="22" rx="1"/>

                                        <!-- дым -->
                                        <circle class="ship-smoke" cx="94" cy="30" r="4"/>
                                        <circle class="ship-smoke" cx="100" cy="24" r="5"/>
                                        <circle class="ship-smoke" cx="108" cy="18" r="6"/>

                                        <!-- мачта -->
                                        <line class="ship-mast" x1="74" y1="24" x2="74" y2="46"/>

                                        <!-- флаг -->
                                        <path class="ship-flag" d="M74 24 L88 28 L74 32 Z"/>

                                        <!-- иллюминаторы -->
                                        <circle class="ship-porthole" cx="68" cy="53" r="1.5"/>
                                        <circle class="ship-porthole" cx="76" cy="53" r="1.5"/>
                                        <circle class="ship-porthole" cx="84" cy="53" r="1.5"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Чекпоинты -->
                    <div class="checkpoint" style="left:20%" data-tip="Выход из порта"></div>
                    <div class="checkpoint" style="left:40%" data-tip="Открытое море"></div>
                    <div class="checkpoint" style="left:60%" data-tip="Зона Кракена"></div>
                    <div class="checkpoint" style="left:80%" data-tip="Берег виден"></div>
                    <div class="checkpoint final" style="left:97%" data-tip="Безопасная гавань"></div>
                </div>

                <!-- Порт назначения — флаг -->
                <div class="voyage-end">
                    <svg viewBox="0 0 24 24">
                        <line x1="5" y1="2" x2="5" y2="22"/>
                        <path d="M5 2l14 5-14 5"/>
                    </svg>
                </div>
            </div>

            <!-- Прочность корпуса -->
            <div class="hull-bar">
                <span class="hull-label">Корпус корабля</span>
                <div class="hull-segments">
                    <div class="hull-segment active" id="hull-1"></div>
                    <div class="hull-segment active" id="hull-2"></div>
                    <div class="hull-segment active" id="hull-3"></div>
                    <div class="hull-segment active" id="hull-4"></div>
                </div>
                <span id="hull-text">4/4</span>
            </div><!-- ═══ Кракен — гравюрный стиль ═══ -->
            <div id="kraken-attack" class="kraken-attack hidden">
                <!-- Основная спрайт-анимация -->
                <div class="kraken-sprite" id="kraken-sprite"></div>

                <!-- Дополнительные CSS-эффекты -->
                <div class="kraken-wave-line" style="--y:12%; --dur:1.4s; --delay:0.1s;"></div>
                <div class="kraken-wave-line" style="--y:18%; --dur:1.6s; --delay:0.2s;"></div>
                <div class="kraken-wave-line" style="--y:24%; --dur:1.5s; --delay:0.05s;"></div>

                <!-- Кляксы -->
                <div class="kraken-blot" style="left:45%; bottom:30%; width:8px; height:7px; --tx:-25px; --ty:-50px; --rot:20deg; --dur:1.1s; --delay:0.1s;"></div>
                <div class="kraken-blot" style="left:55%; bottom:28%; width:6px; height:5px; --tx:30px; --ty:-45px; --rot:-15deg; --dur:1s; --delay:0.15s;"></div>
                <div class="kraken-blot" style="left:42%; bottom:25%; width:5px; height:4px; --tx:-40px; --ty:-35px; --rot:30deg; --dur:0.9s; --delay:0.2s;"></div>

                <!-- Подпись -->
                <div class="kraken-caption">— from the depths —</div>
            </div>

        </div><!-- конец sea-scene -->

    </aside>


    <!-- ═══ Колонка 2: Доска═══ -->
    <div class="board-column">
        <div class="header main-header">
            <h1>KRAKEN</h1>
            <div class="subtitle">Тренажёр дебютов</div>
        </div>
        <div id="board"></div>
    </div>


    <!-- ═══ Колонка 3: Аналитика ═══ -->
    <aside class="analysis-panel">

        <!-- Комбо -->
        <div class="combo-container">
            <div class="combo-info">
                <span class="combo-label">Combo Streak</span>
                <span id="combo-multiplier">x1</span>
            </div>
            <div class="combo-bar-bg">
                <div id="combo-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Нотация -->
        <div class="notation-box">
            <div class="panel-label">История ходов</div>
            <div id="move-history" class="move-history"></div>
        </div>
	
	<a id="lichess-analysis-btn" 
   		class="btn-lichess-analysis" 
   		href="#" 
   		target="_blank" 
   		rel="noopener noreferrer">
  		♟ Анализировать с Lichess
	</a>
        <!-- Комментарии -->
        <div class="feedback-box">
            <div id="opening-badge" class="opening-badge">Начальная позиция</div>
            <div id="kraken-message" class="kraken-message">
                Кракен наблюдает за вашими ходами...
            </div>
        </div>

    </aside>

</div>
<!-- конец .app -->

<div id="achievement-container"></div>
<div id="voyage-overlay"></div>

<script src="sounds.js"></script>
<script src="voyage.js"></script>
<script src="script.js"></script>
</body>
</html>
